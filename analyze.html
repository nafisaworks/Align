<!DOCTYPE html>
<html>
<head>

<title>ALIGN - Analyzer</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<style>
.panel{
margin-top:20px;
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:15px;
width:300px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.score{
font-size:40px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="analyze-container">

<h1>Live Posture Analyzer</h1>

<video id="video" style="display:none;"></video>
<canvas id="canvas" width="640" height="480"></canvas>

<div class="panel">
<div id="score" class="score">Score: --</div>
<p id="feedback"></p>
</div>

</div>

<script>

const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const canvasCtx = canvasElement.getContext('2d');

const feedback = document.getElementById('feedback');
const scoreText = document.getElementById('score');

const pose = new Pose({
locateFile: (file) => {
return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
}
});

pose.setOptions({
modelComplexity: 1,
smoothLandmarks: true,
minDetectionConfidence: 0.5,
minTrackingConfidence: 0.5
});

pose.onResults(results => {

canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

canvasCtx.drawImage(
results.image,
0,
0,
canvasElement.width,
canvasElement.height
);

if(results.poseLandmarks){

drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS,
{color: '#00FF00', lineWidth: 3});

drawLandmarks(canvasCtx, results.poseLandmarks,
{color: '#FF0000', lineWidth: 2});

// LANDMARKS
let ls = results.poseLandmarks[11];
let rs = results.poseLandmarks[12];
let lh = results.poseLandmarks[23];
let rh = results.poseLandmarks[24];
let nose = results.poseLandmarks[0];

// CALCULATIONS
let score = 100;
let messages = [];

let shoulderDiff = Math.abs(ls.y - rs.y);
let headOffset = Math.abs(nose.x - (ls.x + rs.x)/2);
let lean = Math.abs((ls.x+rs.x)/2 - (lh.x+rh.x)/2);

// Shoulders
if(shoulderDiff > 0.05){
score -= 15;
messages.push("Shoulders uneven");
}

// Head forward
if(headOffset > 0.1){
score -= 15;
messages.push("Head forward");
}

// Slouch
if(nose.y > ls.y){
score -= 20;
messages.push("Slouching");
}

// Leaning
if(lean > 0.1){
score -= 10;
messages.push("Leaning sideways");
}

// Clamp score
if(score < 0) score = 0;

// Feedback
if(messages.length === 0){
feedback.innerHTML = "Excellent posture!";
}
else{
feedback.innerHTML = messages.join("<br>");
}

// Color indicator
if(score > 80){
scoreText.style.color = "#22c55e";
}
else if(score > 50){
scoreText.style.color = "#facc15";
}
else{
scoreText.style.color = "#ef4444";
}

scoreText.innerHTML = "Score: " + score;

}

});

const camera = new Camera(videoElement, {
onFrame: async () => {
await pose.send({image: videoElement});
},
width: 640,
height: 480
});

camera.start();

</script>

</body>
</html>
