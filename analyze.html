<!DOCTYPE html>
<html>
<head>

<title>ALIGN - Analyzer</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<style>

.panel{
margin-top:20px;
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.bar{
height:15px;
border-radius:10px;
background:linear-gradient(to right, red, orange, yellow, limegreen);
margin-top:10px;
position:relative;
}

.indicator{
height:15px;
width:10px;
background:white;
position:absolute;
top:0;
border-radius:5px;
}

.feedback{
margin-top:15px;
font-size:18px;
font-weight:500;
line-height:1.5;
}

</style>

</head>

<body>

<div class="analyze-container">

<h1>Posture Analyzer</h1>

<video id="video" style="display:none;"></video>
<canvas id="canvas" width="640" height="480"></canvas>

<div class="panel">

<div class="bar">
<div id="indicator" class="indicator"></div>
</div>

<p id="feedback" class="feedback"></p>

</div>

</div>

<script>

const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const canvasCtx = canvasElement.getContext('2d');

const feedback = document.getElementById('feedback');
const indicator = document.getElementById('indicator');

const pose = new Pose({
locateFile: (file) => {
return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
}
});

pose.setOptions({
modelComplexity: 1,
smoothLandmarks: true,
minDetectionConfidence: 0.5,
minTrackingConfidence: 0.5
});

pose.onResults(results => {

canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

canvasCtx.drawImage(
results.image,
0,
0,
canvasElement.width,
canvasElement.height
);

if(results.poseLandmarks){

drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS,
{color: '#00FF00', lineWidth: 3});

drawLandmarks(canvasCtx, results.poseLandmarks,
{color: '#FF0000', lineWidth: 2});

// LANDMARKS
let ls = results.poseLandmarks[11];
let rs = results.poseLandmarks[12];
let lh = results.poseLandmarks[23];
let rh = results.poseLandmarks[24];
let nose = results.poseLandmarks[0];

// CALCULATIONS
let score = 100;
let messages = [];

// Shoulder imbalance
let shoulderDiff = Math.abs(ls.y - rs.y);
if(shoulderDiff > 0.05){
score -= 15;
messages.push("Try keeping both shoulders level and relaxed");
}

// Head forward
let headOffset = Math.abs(nose.x - (ls.x + rs.x)/2);
if(headOffset > 0.08){
score -= 15;
messages.push("Bring your head slightly back over your shoulders");
}

// Slouch detection (improved)
let shoulderHeight = (ls.y + rs.y)/2;
let hipHeight = (lh.y + rh.y)/2;

if(shoulderHeight > hipHeight - 0.05){
score -= 25;
messages.push("Straighten your back and lift your chest slightly");
}

// Leaning
let lean = Math.abs((ls.x+rs.x)/2 - (lh.x+rh.x)/2);
if(lean > 0.08){
score -= 10;
messages.push("Try to keep your body centered and balanced");
}

// Clamp
if(score < 0) score = 0;

// Indicator position
indicator.style.left = score + "%";

// Feedback
if(messages.length === 0){
feedback.innerHTML = "✨ Great posture! Keep it up.";
}
else{
feedback.innerHTML = messages.join("<br>");
}

}

});

const camera = new Camera(videoElement, {
onFrame: async () => {
await pose.send({image: videoElement});
},
width: 640,
height: 480
});

camera.start();

</script>

</body>
</html>
