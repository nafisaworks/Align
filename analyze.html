<!DOCTYPE html>
<html>
<head>

<title>ALIGN - Analyzer</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<style>

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
padding:15px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

.navbar h2{
margin-left:20px;
}

.navbar button{
margin-right:20px;
}

/* MAIN */
.analyze-container{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding-top:80px;
}

/* PANEL */
.panel{
margin-top:20px;
padding:25px;
background:rgba(255,255,255,0.05);
border-radius:15px;
width:340px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

/* BAR */
.bar{
height:15px;
border-radius:10px;
background:linear-gradient(to right, red, orange, yellow, limegreen);
margin-top:10px;
position:relative;
}

/* INDICATOR */
.indicator{
height:20px;
width:20px;
background:white;
position:absolute;
top:-3px;
border-radius:50%;
box-shadow:0 0 12px white;
}

/* FEEDBACK */
.feedback{
margin-top:15px;
font-size:18px;
font-weight:500;
line-height:1.6;
}

/* CANVAS */
canvas{
border-radius:20px;
box-shadow:0 0 40px rgba(56,189,248,0.4);
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h2>ALIGN</h2>
<button onclick="location.href='index.html'">Home</button>
</div>

<!-- MAIN -->
<div class="analyze-container">

<h1 style="
font-size:60px;
background:linear-gradient(90deg,#38bdf8,#6366f1);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:2px;
">
ALIGN YOUR POSTURE
</h1>

<p style="opacity:0.7; margin-top:10px;">
Real-time posture correction & alignment feedback
</p>

<video id="video" style="display:none;"></video>
<canvas id="canvas" width="640" height="480"></canvas>

<div class="panel">

<div class="bar">
<div id="indicator" class="indicator"></div>
</div>

<p id="feedback" class="feedback"></p>

</div>

</div>

<script>

const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const canvasCtx = canvasElement.getContext('2d');

const feedback = document.getElementById('feedback');
const indicator = document.getElementById('indicator');

let currentPosition = 100;

const pose = new Pose({
locateFile: (file) => {
return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
}
});

pose.setOptions({
modelComplexity: 1,
smoothLandmarks: true,
minDetectionConfidence: 0.5,
minTrackingConfidence: 0.5
});

pose.onResults(results => {

canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

canvasCtx.drawImage(
results.image,
0,
0,
canvasElement.width,
canvasElement.height
);

if(results.poseLandmarks){

drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS,
{color: '#00FF00', lineWidth: 3});

drawLandmarks(canvasCtx, results.poseLandmarks,
{color: '#FF0000', lineWidth: 2});

// LANDMARKS
let ls = results.poseLandmarks[11];
let rs = results.poseLandmarks[12];
let lh = results.poseLandmarks[23];
let rh = results.poseLandmarks[24];
let lk = results.poseLandmarks[25];
let rk = results.poseLandmarks[26];
let nose = results.poseLandmarks[0];

// CALCULATIONS
let score = 100;
let messages = [];

// Shoulders
if(Math.abs(ls.y - rs.y) > 0.05){
score -= 10;
messages.push("Keep both shoulders level and relaxed");
}

// Head
if(Math.abs(nose.x - (ls.x + rs.x)/2) > 0.08){
score -= 10;
messages.push("Align your head over your shoulders");
}

// Slouch
let shoulderHeight = (ls.y + rs.y)/2;
let hipHeight = (lh.y + rh.y)/2;

if(shoulderHeight > hipHeight - 0.05){
score -= 20;
messages.push("Lift your chest and straighten your back");
}

// Body leaning
if(Math.abs((ls.x+rs.x)/2 - (lh.x+rh.x)/2) > 0.08){
score -= 10;
messages.push("Keep your body centered");
}

// Hip imbalance
if(Math.abs(lh.y - rh.y) > 0.05){
score -= 10;
messages.push("Keep your hips level and balanced");
}

// Weight shift
let bodyCenter = (ls.x+rs.x)/2;
let hipCenter = (lh.x+rh.x)/2;

if(Math.abs(bodyCenter - hipCenter) > 0.07){
score -= 10;
messages.push("Avoid shifting your weight to one side");
}

// Knee alignment
let kneeGap = Math.abs(lk.x - rk.x);
let hipGap = Math.abs(lh.x - rh.x);

if(kneeGap < hipGap * 0.5){
score -= 5;
messages.push("Keep your knees aligned under your hips");
}

// Clamp
if(score < 0) score = 0;

// SMOOTH BAR (NO GLITCH)
currentPosition += (score - currentPosition) * 0.1;

// Clamp indicator inside bar
let clamped = Math.max(2, Math.min(98, currentPosition));
indicator.style.left = clamped + "%";

// STABLE FEEDBACK
let newText = messages.length === 0
? "✨ Excellent posture! Keep it up."
: messages.join("<br>");

if(feedback.innerHTML !== newText){
feedback.innerHTML = newText;
}

}

});

const camera = new Camera(videoElement, {
onFrame: async () => {
await pose.send({image: videoElement});
},
width: 640,
height: 480
});

camera.start();

</script>

</body>
</html>
